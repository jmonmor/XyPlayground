on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  xygeni-scan:
    runs-on: ubuntu-latest
    name: xygeni-github-action
    steps:
      # Checkout the repository sources (GITHUB_WORKSPACE)
      - name: Checkout
        # You may instead pin an action SHA, like this: 
        # uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9
        uses: actions/checkout@v3.5.3
        with:
          # The default depth of 1 commit is not enough for some scans 
          fetch-depth: 0
        
      - name: Xygeni-Scanner
        # Pinned: xygeni/xygeni@4e94e5ea737f5ebfedac8b1a5b75d8c60c21932d
        uses: xygeni/xygeni-action@v3.2.0
        id: Xygeni-Scanner
        with:
          token: ${{ secrets.XYGENI_TOKEN }}
          command: scan --send-to=github --never-fail -e '**/test/**,**/target/**,**/docs/node_modules/**,**/doc/**' -f sarif
          gh_token: ${{ secrets.GH_PAT_FOR_DOGFOODING }}
          xygeni_url: https://apidev.xygeni.io/deps-doctor-service
